name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y git zip unzip openjdk-17-jdk python3-pip
        sudo apt-get install -y libffi-dev libssl-dev zlib1g-dev
        pip install buildozer cython
    - name: Accept Android licenses
      run: |
        mkdir -p /root/.android
        echo "count=0" > /root/.android/repositories.cfg
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager --licenses || true
        yes | /usr/local/lib/android/sdk/cmdline-tools/latest/bin/sdkmanager "build-tools;37.0.0" "platforms;android-33" || true
    - name: Build APK
      run: |
        buildozer -v android debug
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: uber-profit-apk
        path: bin/*.apk
