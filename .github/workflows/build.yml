name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip python3-pip \
          libffi-dev libssl-dev zlib1g-dev \
          autoconf automake libtool pkg-config cmake

    - name: Install buildozer
      run: |
        pip install buildozer cython

    - name: Prepare Android SDK
      run: |
        SDK=/usr/local/lib/android/sdk
        mkdir -p $HOME/.buildozer/android/platform
        ln -sf $SDK $HOME/.buildozer/android/platform/android-sdk

        # Creează tools/bin/sdkmanager care lipsește
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/tools/bin
        ln -sf $SDK/cmdline-tools/latest/bin/sdkmanager \
          $HOME/.buildozer/android/platform/android-sdk/tools/bin/sdkmanager

        # Acceptă licențele
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        printf '\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee' \
          > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license
        printf '\n84831b9409646a918e30573bab4c9c91346d8abd' \
          > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-preview-license
        printf '\n859f317696f67ef3d7f30a50a5560e7834b43903' \
          > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-arm-dbt-license

        # Instalează build tools necesare
        $SDK/cmdline-tools/latest/bin/sdkmanager \
          "build-tools;33.0.2" "platforms;android-33" "platform-tools" || true

    - name: Build APK
      env:
        ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
        ANDROID_HOME: /usr/local/lib/android/sdk
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: uber-profit-apk
        path: bin/*.apk
