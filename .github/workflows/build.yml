name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip openjdk-17-jdk python3-pip \
          libffi-dev libssl-dev zlib1g-dev \
          autoconf automake libtool pkg-config cmake

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    - name: Install Android build tools
      run: |
        sdkmanager "build-tools;33.0.2" "platforms;android-33" "platform-tools"
        yes | sdkmanager --licenses || true

    - name: Install buildozer
      run: |
        pip install buildozer cython

    - name: Write Android licenses
      run: |
        mkdir -p $HOME/.buildozer/android/platform/android-sdk/licenses
        cp -r $ANDROID_SDK_ROOT/licenses $HOME/.buildozer/android/platform/android-sdk/ || true
        echo -e "\n8933bad161af4178b1185d1a37fbf41ea5269c55\nd56f5187479451eabf01fb78af6dfcb131a6481e\n24333f8a63b6825ea9c5514f83c2829b004d1fee" > $HOME/.buildozer/android/platform/android-sdk/licenses/android-sdk-license

    - name: Link SDK for buildozer
      run: |
        mkdir -p $HOME/.buildozer/android/platform
        ln -sf $ANDROID_SDK_ROOT $HOME/.buildozer/android/platform/android-sdk

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: uber-profit-apk
        path: bin/*.apk
