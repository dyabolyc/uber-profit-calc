name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - uses: actions/checkout@v3

    - name: Set up JDK 17
      uses: actions/setup-java@v3
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          git zip unzip python3-pip \
          libffi-dev libssl-dev zlib1g-dev \
          autoconf automake libtool pkg-config cmake

    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      env:
        ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

    - name: Install Android build tools
      run: |
        sdkmanager "build-tools;33.0.2" "platforms;android-33" "platform-tools"
        yes | sdkmanager --licenses || true

    - name: Install buildozer
      run: |
        pip install buildozer cython

    - name: Link SDK for buildozer
      run: |
        mkdir -p $HOME/.buildozer/android/platform
        ln -sf $ANDROID_SDK_ROOT $HOME/.buildozer/android/platform/android-sdk
        cp -r $ANDROID_SDK_ROOT/licenses $HOME/.buildozer/android/platform/android-sdk/ 2>/dev/null || true

    - name: Build APK
      run: |
        buildozer -v android debug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: uber-profit-apk
        path: bin/*.apk
